services:
  nginx:
    container_name: nginx
    restart: unless-stopped
    build: ./nginx
    ports:
      - "443:443"
      - "80:80"
    depends_on:
      - auth
      - marketplace
      - chat
      - analytics
      - admin
      - frontend
    networks:
      - leetconnect
    volumes:
      - ./certs/nginx.crt:/etc/nginx/ssl/cert.pem:ro
      - ./certs/nginx.key:/etc/nginx/ssl/key.pem:ro
      - avatars_data:/app/service/uploads/avatars:roq
  postgres:
    container_name: postgres
    build:
      context: .
      dockerfile: services/postgres/Dockerfile
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${POSTGRES_USER}" ]
      interval: 1s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-dbs.sh:/docker-entrypoint-initdb.d/init-dbs.sh
    networks:
      - leetconnect
  redis:
    container_name: redis
    build:
      context: .
      dockerfile: services/redis/Dockerfile
    restart: unless-stopped
    networks:
      - leetconnect
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      REDIS_PASSWORD: ${REDIS_PASS}
    volumes:
      - redis_data:/data
  auth:
    container_name: auth
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    restart: unless-stopped
    networks:
      - leetconnect
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
      - .env.ip
    environment:
      - DATABASE_URL=postgresql://${AUTH_DB_USER}:${AUTH_DB_PASS}@postgres:5432/${AUTH_DB_NAME}
      - REDIS_URL=redis://:${REDIS_PASS}@redis:6379
      - JWT_PRIVATE_KEY_PATH=/etc/ssl/internal/jwt_private.key
      - JWT_PUBLIC_KEY_PATH=/etc/ssl/internal/jwt_public.key
      - INTRA_CLIENT_ID=${INTRA_CLIENT_ID}
      - INTRA_CLIENT_SECRET=${INTRA_CLIENT_SECRET}
    volumes:
      - ./certs:/etc/ssl/internal:ro
      - avatars_data:/app/service/uploads/avatars
  marketplace:
    container_name: marketplace
    build:
      context: .
      dockerfile: services/marketplace/Dockerfile
    restart: unless-stopped
    networks:
      - leetconnect
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${MARKET_DB_USER}:${MARKET_DB_PASS}@postgres:5432/${MARKET_DB_NAME}
      - REDIS_URL=redis://:${REDIS_PASS}@redis:6379
      - AUTH_SERVICE_URL=http://auth:3001
      - JWT_PUBLIC_KEY_PATH=/etc/ssl/internal/jwt_public.key
    volumes:
      - ./certs:/etc/ssl/internal:ro
  chat:
    container_name: chat
    build:
      context: .
      dockerfile: services/chat/Dockerfile
    restart: unless-stopped
    networks:
      - leetconnect
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${CHAT_DB_USER}:${CHAT_DB_PASS}@postgres:5432/${CHAT_DB_NAME}
      - REDIS_URL=redis://:${REDIS_PASS}@redis:6379
      - AUTH_SERVICE_URL=http://auth:3001
      - JWT_PUBLIC_KEY_PATH=/etc/ssl/internal/jwt_public.key
      - POSTGRES_USER=${POSTGRES_USER}
    volumes:
      - ./certs:/etc/ssl/internal:ro
  analytics:
    container_name: analytics
    build:
      context: .
      dockerfile: services/analytics/Dockerfile
    restart: unless-stopped
    networks:
      - leetconnect 
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${ANALYTICS_DB_USER}:${ANALYTICS_DB_PASS}@postgres:5432/${ANALYTICS_DB_NAME}
      - REDIS_URL=redis://:${REDIS_PASS}@redis:6379
      - AUTH_SERVICE_URL=http://auth:3001
      - JWT_PUBLIC_KEY_PATH=/etc/ssl/internal/jwt_public.key
      - POSTGRES_USER=${POSTGRES_USER}
    volumes:
      - ./certs:/etc/ssl/internal:ro
  admin:
    container_name: admin
    build:
      context: .
      dockerfile: services/admin/Dockerfile
    restart: unless-stopped
    networks:
      - leetconnect
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://:${REDIS_PASS}@redis:6379
      - AUTH_SERVICE_URL=http://auth:3001
      - MARKETPLACE_SERVICE_URL=http://marketplace:3002
      - ANALYTICS_SERVICE_URL=http://analytics:3004
      - JWT_PUBLIC_KEY_PATH=/etc/ssl/internal/jwt_public.key
      - DATABASE_URL=postgresql://${ADMIN_DB_USER}:${ADMIN_DB_PASS}@postgres:5432/${ADMIN_DB_NAME}
      - POSTGRES_USER=${POSTGRES_USER}
    volumes:
      - ./certs:/etc/ssl/internal:ro
      # - ./services/admin:/app/service
      # - /app/service/node_modules
      # - SSL_KEY_PATH=/etc/ssl/internal/admin.key
      # - SSL_CERT_PATH=/etc/ssl/internal/admin.crt
      # - NODE_EXTRA_CA_CERTS=/etc/ssl/internal/ca.crt
  frontend:
    container_name: frontend
    build:
      context: ./frontend
      target: dev
    restart: unless-stopped
    networks:
      - leetconnect
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - leetconnect

  grafana:
    image: grafana/grafana:11.1.4
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASS=${GRAFANA_ADMIN_PASS}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - leetconnect

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8080:8080"
    networks:
      - leetconnect

networks:
  leetconnect:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  avatars_data:
