services:
  nginx:
    container_name: nginx
    restart: unless-stopped
    build: ./nginx
    ports:
      - "443:443"
      - "80:80"
    depends_on:
      - auth
      - marketplace
      - chat
      - analytics
      - admin
      - frontend
    networks:
      - leetconnect
    volumes:
      - ./certs/nginx.crt:/etc/nginx/ssl/cert.pem:ro
      - ./certs/nginx.key:/etc/nginx/ssl/key.pem:ro
      - avatars_data:/app/service/uploads/avatars:ro
  postgres:
    container_name: postgres
    build:
      context: .
      dockerfile: services/postgres/Dockerfile
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${POSTGRES_USER}" ]
      interval: 1s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-dbs.sh:/docker-entrypoint-initdb.d/init-dbs.sh
    networks:
      - leetconnect
  redis:
    container_name: redis
    build:
      context: .
      dockerfile: services/redis/Dockerfile
    restart: unless-stopped
    # command: ["redis-server", "--tls-port", "6379", "--port", "0", "--tls-cert-file", "/etc/ssl/internal/redis.crt", "--tls-key-file", "/etc/ssl/internal/redis.key", "--tls-ca-cert-file", "/etc/ssl/internal/ca.crt", "--tls-auth-clients", "no"]
    networks:
      - leetconnect
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
  auth:
    container_name: auth
    # image_name: auth
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    restart: unless-stopped
    networks:
      - leetconnect
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
    - "5555:5555"  # exposed this port so I can connect to prisma ui
    environment:
      - DATABASE_URL=postgresql://${AUTH_DB_USER}:${AUTH_DB_PASS}@postgres:5432/${AUTH_DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=${REDIS_URL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - JWT_PRIVATE_KEY_PATH=/etc/ssl/internal/jwt_private.key
      - JWT_PUBLIC_KEY_PATH=/etc/ssl/internal/jwt_public.key
      # - SSL_KEY_PATH=/etc/ssl/internal/auth.key
      # - SSL_CERT_PATH=/etc/ssl/internal/auth.crt
      # - NODE_EXTRA_CA_CERTS=/etc/ssl/internal/ca.crt
    volumes:
      - ./certs:/etc/ssl/internal:ro
      - avatars_data:/app/service/uploads/avatars
  marketplace:
    container_name: marketplace
    # image_name: marketplace
    build:
      context: .
      dockerfile: services/marketplace/Dockerfile
    restart: unless-stopped
    networks:
      - leetconnect
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${MARKET_DB_USER}:${MARKET_DB_PASS}@postgres:5432/${MARKET_DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=${REDIS_URL}
      - AUTH_SERVICE_URL=http://auth:3001
      - JWT_PUBLIC_KEY_PATH=/etc/ssl/internal/jwt_public.key
      # - SSL_KEY_PATH=/etc/ssl/internal/marketplace.key
      # - SSL_CERT_PATH=/etc/ssl/internal/marketplace.crt
      # - NODE_EXTRA_CA_CERTS=/etc/ssl/internal/ca.crt
    volumes:
      - ./certs:/etc/ssl/internal:ro
  chat:
    container_name: chat
    # image_name: chat
    build:
      context: .
      dockerfile: services/chat/Dockerfile
    restart: unless-stopped
    networks:
      - leetconnect
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${CHAT_DB_USER}:${CHAT_DB_PASS}@postgres:5432/${CHAT_DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=${REDIS_URL}
      - AUTH_SERVICE_URL=http://auth:3001
      - JWT_PUBLIC_KEY_PATH=/etc/ssl/internal/jwt_public.key
      # - SSL_KEY_PATH=/etc/ssl/internal/chat.key
      # - SSL_CERT_PATH=/etc/ssl/internal/chat.crt
      # - NODE_EXTRA_CA_CERTS=/etc/ssl/internal/ca.crt
    volumes:
      - ./certs:/etc/ssl/internal:ro
  analytics:
    container_name: analytics
    # image_name: analytics
    build:
      context: .
      dockerfile: services/analytics/Dockerfile
    restart: unless-stopped
    networks:
      - leetconnect 
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${ANALYTICS_DB_USER}:${ANALYTICS_DB_PASS}@postgres:5432/${ANALYTICS_DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=${REDIS_URL}
      - AUTH_SERVICE_URL=http://auth:3001
      - JWT_PUBLIC_KEY_PATH=/etc/ssl/internal/jwt_public.key
      # - SSL_KEY_PATH=/etc/ssl/internal/analytics.key
      # - SSL_CERT_PATH=/etc/ssl/internal/analytics.crt
      # - NODE_EXTRA_CA_CERTS=/etc/ssl/internal/ca.crt
    volumes:
      - ./certs:/etc/ssl/internal:ro
      - ./services/analytics:/app/service
      - /app/service/node_modules
  admin:
    container_name: admin
    # image_name: admin
    build:
      context: .
      dockerfile: services/admin/Dockerfile
    restart: unless-stopped
    networks:
      - leetconnect
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # - auth
      # - marketplace
      # - analytics
    environment:
      - REDIS_URL=${REDIS_URL} 
      - JWT_SECRET=${JWT_SECRET}
      - AUTH_SERVICE_URL=http://auth:3001
      - MARKETPLACE_SERVICE_URL=http://marketplace:3002
      - ANALYTICS_SERVICE_URL=http://analytics:3004
      - JWT_PUBLIC_KEY_PATH=/etc/ssl/internal/jwt_public.key
      - DATABASE_URL=postgresql://${ADMIN_DB_USER}:${ADMIN_DB_PASS}@postgres:5432/${ADMIN_DB_NAME}
    volumes:
      - ./certs:/etc/ssl/internal:ro
      - ./services/admin:/app/service
      - /app/service/node_modules
      # - SSL_KEY_PATH=/etc/ssl/internal/admin.key
      # - SSL_CERT_PATH=/etc/ssl/internal/admin.crt
      # - NODE_EXTRA_CA_CERTS=/etc/ssl/internal/ca.crt
  frontend:
    container_name: frontend
    build: ./frontend
    restart: unless-stopped
    networks:
      - leetconnect
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./public/avatars:/app/public/avatars
    # environment: # added to auto apply changes in front
    # - CHOKIDAR_USEPOLLING=true
    # - WATCHPACK_POLLING=true
      
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - leetconnect

  grafana:
    image: grafana/grafana:11.1.4
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - leetconnect

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8080:8080"
    networks:
      - leetconnect

networks:
  leetconnect:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  avatars_data:
