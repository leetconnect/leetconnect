global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: auth
    metrics_path: /metrics
    static_configs:
      - targets: ['auth:3001']

  - job_name: marketplace
    metrics_path: /metrics
    static_configs:
      - targets: ['marketplace:3002']

  - job_name: chat
    metrics_path: /metrics
    static_configs:
      - targets: ['chat:3003']

  - job_name: analytics
    metrics_path: /metrics
    static_configs:
      - targets: ['analytics:3004']

  - job_name: admin
    metrics_path: /metrics
    static_configs:
      - targets: ['admin:3005']
